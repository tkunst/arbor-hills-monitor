name: links

on:
  pull_request:
    paths:
      - "**/*.md"
  push:
    branches: [main]
    paths:
      - "**/*.md"

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --config .github/lychee.toml
            './**/*.md'
          fail: true
