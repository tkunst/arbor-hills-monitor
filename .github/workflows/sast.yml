name: sast

# Static application security testing (Bandit) for the Python codebase.
# BLOCKING GATE: it scans every PR + push and FAILS the build on any medium+
# severity/confidence finding (final `exit "$rc"`). The pre-existing findings
# (1 XXE B314, 1 B310 urlopen, 3 B324 SHA1) were all cleared in the
# CD-governance package (see docs/session-2026-07-18-cd-governance-enforcement.md);
# the current scan is green. Bandit is PINNED (see below) so a future release
# can't silently turn this required check red without a deliberate bump.
# Phase C adds `bandit` to branch-protection required_status_checks.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bandit
        # PINNED (not --upgrade): once `bandit` is a required check, an
        # unpinned release that adds a rule or raises a severity would turn the
        # gate red with zero code change and block all merges. Bump deliberately.
        run: |
          python -m pip install --upgrade pip
          python -m pip install "bandit==1.9.4"
      - name: Run bandit (medium+ severity + confidence; tests excluded)
        run: |
          set +e
          bandit -r . -x ./tests,./.venv,./.git \
            --severity-level medium --confidence-level medium \
            -f custom --msg-template "{severity}/{confidence} {test_id} {relpath}:{line} -- {msg}" \
            | tee bandit-report.txt
          rc=${PIPESTATUS[0]}
          {
            echo "## Bandit SAST (blocking gate)"
            echo ""
            if [ -s bandit-report.txt ]; then
              echo "Findings at medium+ severity/confidence (BUILD FAILS):"
              echo ""
              echo '```'
              cat bandit-report.txt
              echo '```'
            else
              echo "No findings at medium+ severity/confidence. ✅"
            fi
            echo ""
            echo "_Blocking gate: any medium+ finding fails this check. Phase C adds \`bandit\` to branch-protection required checks._"
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$rc"   # blocking gate: fail the build on any medium+ finding
      - name: Upload SAST report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.txt
