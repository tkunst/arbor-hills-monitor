name: tests

on:
  pull_request:
    paths:
      - "**/*.py"
      - requirements.txt
      - .github/workflows/tests.yml
  push:
    branches: [main]
    paths:
      - "**/*.py"

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        # Tests are hermetic: synthetic PDFs built in-process, all network/API
        # calls (Anthropic, Google, nSITE) mocked. No secrets needed.
        run: pytest -q
