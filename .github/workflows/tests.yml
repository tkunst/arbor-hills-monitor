name: tests

# No `paths:` filter, deliberately: `pytest` is a REQUIRED status check (see the
# CD-governance package / docs/session-2026-07-18-cd-governance-enforcement.md).
# A required check that is path-filtered stays "pending forever" on any PR that
# doesn't touch the filtered paths, which blocks the merge. So it runs on every
# PR and every push to main and always reports a definite pass/fail.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        # Tests are hermetic: synthetic PDFs built in-process, all network/API
        # calls (Anthropic, Google, nSITE) mocked. No secrets needed.
        run: pytest -q
