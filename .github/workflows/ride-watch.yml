name: ride-watch

# EGLE RIDE / Part 201 + UST status watch (Stream J, ADR 019): daily
# snapshot-diff on EGLE's keyless RRDOpenData ArcGIS registry — Layer 0 (the
# 5 Arbor Hills-area Part 201 remediation sites) and Layer 1 (the GFL Part 211
# UST). Emails an alert on any change vs. the last snapshot in the "RIDE
# Watch" tab. First sighting of each watched item baselines silently.
#
# Safe to leave scheduled from day one: ride.enabled gates the run —
# ride_watcher._should_run() makes every run a quiet no-op (exit 0) while it's
# false (ships disabled — a brand-new source, overnight-coder's new-source
# gate). No Anthropic (a deterministic snapshot-diff, not the Claude
# classifier) and no Drive/OAuth (the deliverable is the alert + the durable
# Sheet row, same scope call as pfas/rop/mmd — ADR 012). Noon ET is the free
# slot after mmd-watch's 11am; state is the "RIDE Watch" tab, NOT _meta, so it
# never races the other jobs.
on:
  schedule:
    - cron: "0 17 * * *"    # 12pm ET (5pm UTC). DST drift of +/-1h is acceptable.
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ride-watch
  cancel-in-progress: false

jobs:
  ride-watch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Write service-account key to a temp file
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SA_KEY }}
        run: |
          printf '%s' "$GDRIVE_SA_KEY" > "$RUNNER_TEMP/gdrive-sa-key.json"
          echo "GDRIVE_SA_KEY=$RUNNER_TEMP/gdrive-sa-key.json" >> "$GITHUB_ENV"
      - name: Watch RIDE / Part 201 + UST status for changes
        env:
          # Sheets I/O uses the service account; the change alert uses SMTP.
          # No Anthropic (nothing to classify) and no OAuth (no Drive mirror).
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          ALERT_RECIPIENTS_EXTRA: ${{ secrets.ALERT_RECIPIENTS_EXTRA }}
        run: python ride_watcher.py
