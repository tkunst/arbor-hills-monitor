name: pfas-watch

# Content-hash page-watch on EGLE's PFAS-investigation page(s) for Arbor Hills
# (ADR 012). Fetches each page, isolates its <main> content (ignoring Sitecore
# theme cache-busters — see pfas_client.py), and emails an alert with a diff when
# it changes vs. the last snapshot in the "PFAS Page Watch" tab. First sighting
# baselines silently.
#
# Safe to leave scheduled from day one: pfas.enabled is false by default, so
# pfas_watcher._should_run() makes every run a quiet no-op (exit 0) until Trisha
# flips it on. Lighter than the other jobs — no Anthropic, no OCR, no Drive/OAuth
# (Sheets I/O via the service account + SMTP for the alert). State is the
# append-only PFAS Page Watch tab, NOT _meta, so this never races the other jobs
# on the _meta cell; 7am ET simply keeps it clear of the 3–6am cluster.
on:
  schedule:
    - cron: "0 12 * * *"    # 7am ET (12pm UTC). DST drift of +/-1h is acceptable.
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: pfas-watch
  cancel-in-progress: false

jobs:
  pfas-watch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Write service-account key to a temp file
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SA_KEY }}
        run: |
          printf '%s' "$GDRIVE_SA_KEY" > "$RUNNER_TEMP/gdrive-sa-key.json"
          echo "GDRIVE_SA_KEY=$RUNNER_TEMP/gdrive-sa-key.json" >> "$GITHUB_ENV"
      - name: Watch PFAS page(s) for changes
        env:
          # Sheets I/O uses the service account; the change alert uses SMTP.
          # No Anthropic (nothing to classify) and no OAuth (no Drive mirror).
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          ALERT_RECIPIENTS_EXTRA: ${{ secrets.ALERT_RECIPIENTS_EXTRA }}
        run: python pfas_watcher.py
