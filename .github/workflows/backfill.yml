name: backfill

# Processes the existing ~754 N2688 documents in batches of 50, one batch per
# nightly run, resuming from the Sheet's _state tab. Self-terminating: once
# _state shows every doc processed, the run logs "Backfill complete" and exits
# 0 — it just becomes a no-op. No human action needed to shut it off.
on:
  # SCHEDULE DISABLED 2026-07-07 — historical backfill is complete (0 remaining).
  # The daily cron was RACING the watcher: backfill ran 4h earlier (2am vs the
  # watcher's 6am ET), so it claimed each new nSITE filing and processed it
  # WITHOUT sending email (backfill has no alert path). The watcher then saw
  # "0 new" and no alert ever fired — e.g. the 2026-06-26 SEM inspection package
  # (2 evidence/urgent docs) landed silently in the Sheet. With the cron off, the
  # watcher (daily.yml) is the sole processor of new filings and its urgent/digest
  # emails work again. Kept as workflow_dispatch for manual RETRY_POISONED runs and
  # future new-facility backfills. See handoffs/2026-07-07-arbor-hills-no-email-diagnosis.md
  # schedule:
  #   - cron: "0 7 * * *"   # 2am ET (7am UTC). DST drift is fine for a backfill.
  workflow_dispatch:       # allow manual runs while iterating
    inputs:
      retry_poisoned:
        description: "Re-attempt poisoned docs (>=3 failures) this run — use after raising classification_max_tokens"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: backfill          # never overlap two backfill runs
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60     # a 50-doc batch is ~20 min; well under the 6h cap
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system OCR tooling
        run: sudo apt-get update && sudo apt-get install -y ocrmypdf
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Write service-account key to a temp file
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SA_KEY }}
        run: |
          printf '%s' "$GDRIVE_SA_KEY" > "$RUNNER_TEMP/gdrive-sa-key.json"
          echo "GDRIVE_SA_KEY=$RUNNER_TEMP/gdrive-sa-key.json" >> "$GITHUB_ENV"
      - name: Run one backfill batch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # GDRIVE_FOLDER_ID is vestigial since ADR 006 (state + links no longer
          # use a Drive folder); left unset. State lives in the Sheet's tabs.
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          # Default false; set true via "Run workflow" to re-attempt poison docs.
          RETRY_POISONED: ${{ inputs.retry_poisoned }}
        run: python backfill.py
