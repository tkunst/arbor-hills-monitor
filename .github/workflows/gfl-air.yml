name: gfl-air

# Stream E (ADR 014): daily poll of GFL's public perimeter air-monitoring ArcGIS
# feed for Arbor Hills. Pulls new H2S/CH4 fenceline readings incrementally (an
# OBJECTID cursor stored in the "GFL Air" tab), writes them to the shared
# Measurements tab (basis=measured), refreshes a small latest-per-station snapshot,
# and emails a same-day alert when a reading crosses a config action level.
#
# Safe to leave scheduled from day one: gfl_air.enabled is false by default, so
# gfl_air_watcher._should_run() makes every run a quiet no-op (exit 0) until Trisha
# reviews the alert thresholds and flips it on. Lighter than the doc jobs — no
# Anthropic, no OCR, no Drive/OAuth (keyless ArcGIS GET + Sheets via the service
# account + SMTP for the alert). State is the "GFL Air" tab (the OBJECTID cursor),
# NOT _meta, so this never races the other jobs on the _meta cell; 8am ET simply
# keeps it clear of the 3–7am cluster.
on:
  schedule:
    - cron: "0 13 * * *"    # 8am ET (1pm UTC). DST drift of +/-1h is acceptable.
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: gfl-air
  cancel-in-progress: false

jobs:
  gfl-air:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Write service-account key to a temp file
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SA_KEY }}
        run: |
          printf '%s' "$GDRIVE_SA_KEY" > "$RUNNER_TEMP/gdrive-sa-key.json"
          echo "GDRIVE_SA_KEY=$RUNNER_TEMP/gdrive-sa-key.json" >> "$GITHUB_ENV"
      - name: Poll GFL perimeter air feed
        env:
          # Sheets I/O uses the service account; exceedance alerts use SMTP.
          # No Anthropic (nothing to classify) and no OAuth (no Drive mirror).
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          ALERT_RECIPIENTS_EXTRA: ${{ secrets.ALERT_RECIPIENTS_EXTRA }}
        run: python gfl_air_watcher.py
