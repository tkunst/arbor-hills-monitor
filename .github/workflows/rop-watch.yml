name: rop-watch

# ROP (air Title V permit) watch (ADR 017): daily watch on EGLE's EPA ROP Monthly
# Report CSV (task-status/permit-status/dates for N2688/N1504/P1488), the N2688
# renewal folder's file list, and the statewide ROP_Public_Notice.pdf's N2688
# mention. Emails an alert on any change vs. the last snapshot in the "ROP Watch"
# tab. First sighting of each watched item baselines silently.
#
# Safe to leave scheduled from day one: rop.enabled is false by default, so
# rop_watcher._should_run() makes every run a quiet no-op (exit 0) until Trisha
# reviews it and flips it on. No Anthropic (a deterministic extractor, not the
# Claude classifier) and no Drive/OAuth (the deliverable is the alert + the
# durable Sheet row, same scope call as pfas_watcher — ADR 012). 10am ET keeps it
# clear of the 3–9am cluster; state is the "ROP Watch" tab, NOT _meta, so it
# never races the other jobs.
on:
  schedule:
    - cron: "0 15 * * *"    # 10am ET (3pm UTC). DST drift of +/-1h is acceptable.
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: rop-watch
  cancel-in-progress: false

jobs:
  rop-watch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Write service-account key to a temp file
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SA_KEY }}
        run: |
          printf '%s' "$GDRIVE_SA_KEY" > "$RUNNER_TEMP/gdrive-sa-key.json"
          echo "GDRIVE_SA_KEY=$RUNNER_TEMP/gdrive-sa-key.json" >> "$GITHUB_ENV"
      - name: Watch ROP sources for changes
        env:
          # Sheets I/O uses the service account; the change alert uses SMTP.
          # No Anthropic (nothing to classify) and no OAuth (no Drive mirror).
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          ALERT_RECIPIENTS_EXTRA: ${{ secrets.ALERT_RECIPIENTS_EXTRA }}
        run: python rop_watcher.py
