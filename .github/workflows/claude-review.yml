name: claude-review

# Independent, advisory CI code review — a "cold process" second read of every
# PR diff (fresh context, no in-session state), so a review PROVABLY ran on the
# change. This complements (does not replace) the in-session /security-review,
# which stays authoritative for security per the CD-governance plan.
#
# ADVISORY / NON-BLOCKING BY DESIGN: claude-code-action posts its findings as PR
# comments and never sets a blocking review status, so it exits 0 even when it
# finds problems. It is deliberately NOT wrapped in `continue-on-error` / `|| true`:
# a RED check here means the review genuinely could not run (bad/missing key, API
# timeout, action crash) — the failure a "provably ran" gate must surface.
#
# ONE CAVEAT (green does NOT unconditionally mean "a review ran"): the action
# deliberately SKIPS, and still exits 0 / green, on any PR that modifies a
# workflow file — a security guard so a PR can't make the reviewer run against
# its own edited workflow + secrets. So green means "reviewed (clean or with
# advisory comments) OR skipped because this PR touched a workflow". For a
# workflow-touching PR, the in-session /code-review is the fallback review
# (see docs/overnight-coder.md Step 5). This doesn't weaken the real gates —
# bandit / pytest / CodeQL / gitleaks still run — which is why the locked plan
# keeps this review advisory, not a hard gate.
#
# The required check-run context is `review` (confirmed on PR #23's first run;
# the earlier-guessed `claude-review / review` was wrong). Phase C adds it to
# branch-protection required checks ONLY after a non-workflow PR proves a real
# review comment posts. See docs/session-2026-07-18-cd-governance-enforcement.md.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read # read the repo + PR diff
  pull-requests: write # post the review as PR comments
  id-token: write # OIDC token claude-code-action uses to authenticate

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # The action auto-detects the PR from the event context — no need to
          # (and we must not) interpolate attacker-controlled PR title/body/ref
          # into this prompt. Keep it a static instruction.
          prompt: |
            Review this pull request's diff for:
            - correctness bugs (logic errors, crash paths, wrong edge-case handling)
            - security issues
            - clear simplifications or reuse of an existing helper
            Post findings as inline comments on the specific lines they concern.
            Be concise and specific; skip style nits. If the diff looks clean,
            say so briefly.
