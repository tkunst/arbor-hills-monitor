name: daily

# Daily watcher: checks nSITE for N2688 docs filed since the last checkpoint,
# runs the MMPC second-Wednesday / minutes-polling logic, and sends alerts
# (urgent same-day; procedural + everything else into the Sunday digest).
on:
  # ENABLED 2026-06-15 — backfill is complete (1547/1564 processed; the rest are
  # poison docs the watcher also skips). The watcher's max_new_docs_per_run cap
  # is the backstop against any historical-doc surprise.
  schedule:
    - cron: "0 11 * * *"   # 6am ET (11am UTC). DST drift of +/-1h is acceptable.
  workflow_dispatch:
    inputs:
      send_test:
        description: "Send a test email to the configured recipients (verifies SMTP), then run the watcher"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: daily
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system OCR tooling
        run: sudo apt-get update && sudo apt-get install -y ocrmypdf
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Write service-account key to a temp file
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SA_KEY }}
        run: |
          printf '%s' "$GDRIVE_SA_KEY" > "$RUNNER_TEMP/gdrive-sa-key.json"
          echo "GDRIVE_SA_KEY=$RUNNER_TEMP/gdrive-sa-key.json" >> "$GITHUB_ENV"
      - name: Send test email (manual send_test runs only)
        if: ${{ inputs.send_test == true }}
        env:
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: python -c "import email_alerts, config_loader; email_alerts.send_test_email(config_loader.load_config())"
      - name: Run the watcher
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # GDRIVE_FOLDER_ID is vestigial since ADR 006 (state + links no longer
          # use a Drive folder); left unset. State lives in the Sheet's tabs.
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: python watcher.py
