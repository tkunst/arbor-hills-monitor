name: daily

# Daily watcher: checks nSITE for N2688 docs filed since the last checkpoint,
# runs the MMPC second-Wednesday / minutes-polling logic, and sends alerts
# (urgent same-day; procedural + everything else into the Sunday digest).
on:
  # DISABLED until backfill logs "Backfill complete". If the daily watcher runs
  # while the ~754-doc history is still unprocessed, it would treat hundreds of
  # historical docs as "new" — wrong tab, and urgent alerts on years-old
  # exceedances. (The watcher also has a max_new_docs_per_run backstop, but
  # leaving the schedule off until backfill finishes is the clean fix.)
  # Uncomment the two lines below once backfill is complete:
  # schedule:
  #   - cron: "0 11 * * *"   # 6am ET (11am UTC). DST drift of +/-1h is acceptable.
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: daily
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system OCR tooling
        run: sudo apt-get update && sudo apt-get install -y ocrmypdf
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Write service-account key to a temp file
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SA_KEY }}
        run: |
          printf '%s' "$GDRIVE_SA_KEY" > "$RUNNER_TEMP/gdrive-sa-key.json"
          echo "GDRIVE_SA_KEY=$RUNNER_TEMP/gdrive-sa-key.json" >> "$GITHUB_ENV"
      - name: Run the watcher
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # GDRIVE_FOLDER_ID is vestigial since ADR 006 (state + links no longer
          # use a Drive folder); left unset. State lives in the Sheet's tabs.
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python watcher.py
