name: secrets

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # We run the gitleaks CLI directly rather than gitleaks-action@v2 because
      # the action's incremental mode diffs against the parent of the pushed
      # range, which doesn't exist on a repo's first commit (it computes
      # `<initial-commit>^..HEAD` and git errors out before scanning). The CLI's
      # `detect` scans the FULL history deterministically — works on the initial
      # push, subsequent pushes, and PRs alike. Exits non-zero if any leak found.
      - name: Install gitleaks
        run: |
          set -euo pipefail
          VER=8.24.3
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan full git history for secrets
        run: gitleaks detect --redact -v --no-banner
