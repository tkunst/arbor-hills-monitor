name: markdownlint

on:
  pull_request:
    paths:
      - "**/*.md"
      - .markdownlint.yaml
      - .github/workflows/markdownlint.yml
  push:
    branches: [main]
    paths:
      - "**/*.md"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"
