# Arbor Hills Document Monitor — non-secret configuration.
# Secrets live in .env / GitHub Secrets, never here. See .env.example.

# --- nSITE / EGLE source ---
# The facilities to track. Each entry is one nSITE facility profile; the monitor
# fetches all of them and tags every document with its facility (the "Facility"
# column in the Sheet). nSITE doc_ids are GLOBALLY UNIQUE across these facilities
# (verified 0 pairwise overlap, 2026-06-15), so they safely share one Sheet and
# one _state tab with no composite key. See docs/decisions/008-multi-facility.md.
#
# ORDER MATTERS for backfill: it concatenates the facilities in THIS order and
# processes the next `backfill_batch_size` unprocessed docs each run, so whatever
# is listed first gets pulled first. The Remediation Area (R5/PFAS) leads so it
# clears first; N2688's ~704 not-yet-processed docs are listed LAST so they don't
# block it (its ~50 already-processed docs are skipped regardless). The watcher
# and archiver are order-independent.
facilities:
  - {srn: "RA",    name: "Arbor Hills Remediation Area",  id: "-714792003991405124"}   # Water/RRD — R5/PFAS, process FIRST (740 docs)
  - {srn: "N1504", name: "Arbor Hills Energy",            id: "-4937599654678851055"}   # SO2 turbine power plant (54 docs)
  - {srn: "P1488", name: "Emerald RNG",                   id: "-5064275074930604158"}   # OPAL/GFL RNG plant (16 docs)
  - {srn: "N2688", name: "Arbor Hills Landfill",         id: "8094300008956198244"}    # the landfill — ~704 remaining, finish AFTER

# --- Document classification ---
# Haiku is the deliberate cost choice for the 754-doc backfill (~$2-4 total);
# routine monitoring is a few docs/day, essentially free. Override here if you
# want a more capable model for live monitoring vs. backfill.
anthropic_model: "claude-haiku-4-5"
# Output cap for the classification call. Generous enough that measurements[]
# on a multi-well WOI report isn't truncated mid-JSON. If a doc ever fails with
# "Classification truncated at max_tokens", raise this.
# Raised 8192 -> 16384 on 2026-06-15: of the 17 docs that poisoned out in the
# multi-facility backfill, 2 were genuine 8192-token classification overflows
# (recovered by this bump via a RETRY_POISONED=1 run). The OTHER 15 poison docs
# are NOT a token problem — they are legacy .doc (Word) source files whose nSITE
# downloadpdf endpoint returns HTTP 400 (~13) plus 2 unscannable images; raising
# max_tokens does nothing for those. See the "known unprocessable" note in
# README / docs. Haiku output is $5/1M tok, so the headroom is spent only on
# docs that actually need it.
classification_max_tokens: 16384

# Large-document handling: docs with more pages than this get targeted
# keyword-window extraction instead of full text (saves tokens, better
# key_data_point). The two WOI Status Reports are 181 and 323 pages.
large_doc_page_threshold: 30
large_doc_max_keyword_pages: 10

# --- WOI (Wells of Interest) auto-routing (ADR 005 integration, added 2026-07-13) ---
# The semi-annual WOI Status Reports (the two are 181 and 323 pp of per-well
# gas-extraction tables) are routed to the exhaustive woi_table_parser instead of
# the generic keyword-windowing above. Windowing captures <5% of the ~14,000
# readings AND can miss a measured >=145F exceedance entirely — a hot well buried
# on a page with no signal keyword produces no measurement, so is_urgent never
# fires. Detection is CONTENT-based (the Attachment-1 "Gas Extraction Report"
# header + page count), NOT the nSITE filename: the real reports are filed under
# generic names ("nForm Document"/"Site"), so a name signal would never fire.
# See woi_router.py and docs/decisions/005.
#
# This is a LIVE-PATH fix that ships ON. `auto_route` is a ROLLBACK LEVER, not a
# new-source enable gate: flip it to false and the monitor falls back to
# windowing if the detector or the volume ever misbehaves.
woi:
  auto_route: true

# --- Backfill ---
backfill_batch_size: 50          # docs per nightly run

# --- Archive (optional durable PDF mirror — ADR 007) ---
# The archiver mirrors processed PDFs into a Drive folder Trisha owns (OAuth),
# as insurance against nSITE link rot. No Claude/OCR, just download + upload, so
# a larger batch than the backfill is fine. folder_name is used ONCE by
# scripts/oauth_setup.py when it creates the folder; the archiver then uses the
# GOAUTH_ARCHIVE_FOLDER_ID secret.
archive:
  batch_size: 100
  folder_name: "Arbor Hills EGLE Document Mirror"

# --- Watcher (daily) ---
# The daily watcher handles INCREMENTAL new filings only (normal volume is 0-5).
# If it ever sees more unprocessed docs than this, the historical backlog is not
# cleared yet: it DEFERS to the backfill job (processes no docs this run, still
# runs digest housekeeping) rather than stampeding hundreds of historical
# docs into the live feed and firing urgent alerts on years-old exceedances. The
# daily schedule should stay disabled until backfill logs "Backfill complete"
# anyway (see README); this cap is the belt-and-suspenders backstop.
watcher:
  max_new_docs_per_run: 25

# --- WDS (Stream C — EGLE Waste Data System, Part 115 solid waste) ---
# OFF BY DEFAULT. WDS is the solid-waste system of record for the landfill
# (site 475946) — a different portal from nSITE (Air, the `facilities` feed
# above). When enabled, the daily watcher polls the collections below, diffs
# against stored state (Sheet _meta `wds_seen`), and alerts on NEW/CHANGED
# records using wds_watcher's OWN classifier. See docs/decisions/009-wds-stream-c.md.
#
# ACTIVATION — all three steps are Trisha's call (see the Stream C PR):
#   1. review + merge the stream-c-wds branch to main,
#   2. (optional) run `python scripts/seed_wds_state.py` ONCE to baseline — if you
#      skip it, the FIRST enabled run self-baselines silently (records all current
#      rows, alerts on none), so enabling is safe either way,
#   3. set `enabled: true` here and commit.
# Until `enabled: true` is on main, the watcher's WDS block is a no-op.
wds:
  enabled: true
  site_id: "475946"                 # Arbor Hills Landfill, Inc. (MIK114185416)
  # Collections to poll + their alert tiers (wds_watcher classifier):
  #   applications       new Construction Permit / -> Issued = URGENT (R1 expansion);
  #                      Operating License = notable
  #   compliance_actions new violation notice / assessed penalty = URGENT (R2);
  #                      PAID/RESOLVED/withdrawn = watch
  #   qmr                Statistical Exceedence = Yes -> notable (R5 groundwater);
  #                      No -> watch
  #   annual             new report = watch; years-remaining < floor -> notable (R1)
  #   evaluations        new inspection = watch
  collections:
    - applications
    - compliance_actions
    - qmr
    - annual
    - evaluations
  years_remaining_floor: 3.0        # annual report: below this (yrs) -> notable
  # Anti-stampede: if one run yields more alert events than this, treat it as a
  # first-enable-without-seed or a data anomaly and silently re-baseline instead
  # of blasting the list (mirrors watcher.max_new_docs_per_run).
  max_new_wds_alerts_per_run: 20

# --- MMPC minutes reminder — RETIRED 2026-07-12 (ADR 013) ---
# The old `mmpc:` block (2nd-Wednesday meeting-date math + a "minutes likely
# posted, go check" reminder email, mmpc_watcher.py) was removed once Mirror D
# below made it redundant: Mirror D downloads every published MMPC PDF directly,
# so there is nothing left to remind about. See docs/decisions/013.

# --- MMPC document archive (Mirror D, ADR 010, added 2026-07-10) ---
# Auto-downloads every Agenda/Minutes/Other PDF CivicClerk publishes for the
# MMPC (category_id 72) and uploads it into the SAME Drive folder Trisha
# already hand-populates (MMPC-meeting-minutes/, via GOAUTH_MMPC_FOLDER_ID —
# a separate secret from GOAUTH_ARCHIVE_FOLDER_ID, since this is a different
# destination folder). Dedup is Sheet-derived (MMPC Archived Files tab), not a
# _meta key — see mmpc_archiver.py.
#
# ACTIVATION — same three-step pattern as Stream C (see wds: above):
#   1. review + merge,
#   2. first enabled run just archives everything published so far (no seed
#      script needed — there's no "alert flood" risk here, unlike WDS's
#      classified events, since this only ever writes an index row + uploads
#      a file, never emails),
#   3. set `enabled: true` here and commit.
# Until `enabled: true` is on main, mmpc-archive.yml runs on schedule but
# mmpc_archiver.py's _should_run() gate makes every run a no-op.
mmpc_archive:
  enabled: true                     # activated 2026-07-11 (Trisha) — secret set + merged; see ADR 010
  category_id: 72

# --- PFAS page-watch (ADR 012, added 2026-07-12) ---
# OFF BY DEFAULT. A lightweight content-hash watch on EGLE's PFAS-investigation
# page(s) for Arbor Hills — prose EGLE edits in place when the investigation
# moves, with no structured feed or per-record PDFs to parse. When enabled,
# pfas_watcher.py fetches each page, isolates its <main> content (ignoring the
# Sitecore theme cache-busters that rotate on every state-wide redeploy — see
# pfas_client.py for why a whole-page hash would false-alarm constantly), hashes
# it, and emails an alert (with a visible-text diff) when it changes vs. the last
# snapshot in the "PFAS Page Watch" tab. The FIRST sighting baselines silently.
#
# ACTIVATION — same three-step pattern as Stream C / Mirror D:
#   1. review + merge,
#   2. the first enabled run just baselines every page (records a hash, alerts on
#      none) — no seed script needed,
#   3. set enabled: true here and commit.
# Until enabled: true is on main, pfas-watch.yml runs on schedule but
# pfas_watcher._should_run() makes every run a quiet no-op.
pfas:
  enabled: true                     # activated 2026-07-12 (Trisha) — see ADR 012
  # Minimum <main> visible-text length for a fetch to count as the real page; a
  # shorter body is treated as a bad fetch / bot-wall error page and skipped,
  # never diffed into a false "changed" alert.
  min_content_chars: 200
  pages:
    - label: "Arbor Hills Landfill PFAS investigation"
      url: "https://www.michigan.gov/pfasresponse/investigations/sites-aoi/washtenaw-county/arbor-hills-landfill"

# --- GFL perimeter air (Stream E, ADR 014, added 2026-07-14) ---
# OFF BY DEFAULT. The FIRST source of real fenceline READINGS (R3 odor / R4 air),
# not documents: GFL self-reports HOURLY H2S (ppb) and CH4 (ppm) at six perimeter
# stations (MS-1..MS-6) on a public ArcGIS dashboard backed by a keyless Barr
# Engineering FeatureServer. When enabled, gfl_air_watcher.py polls the readings
# table incrementally (OBJECTID cursor stored in the "GFL Air" tab — NOT _meta, so
# a separate workflow can't clobber the daily watcher's state), writes readings to
# the shared Measurements tab (basis=measured), refreshes a small latest-per-station
# snapshot, and emails a same-day alert when a reading crosses a config action level
# using the stream's OWN classifier (never the temperature-oriented is_urgent).
#
# ACTIVATION — same three-step pattern as Stream C / Mirror D / PFAS. All Trisha's:
#   1. review + merge,
#   2. the first enabled run just baselines the current readings (records the
#      snapshot + sets the cursor, alerts on NONE) — no seed script needed, and it
#      cannot blast the ~214k-row history,
#   3. CONFIRM the alert thresholds below (a wrong threshold floods or starves —
#      see ADR 014), then set enabled: true here and commit.
# Until enabled: true is on main, gfl-air.yml runs on schedule but
# gfl_air_watcher._should_run() makes every run a quiet no-op. It is keyless — no
# secret to provision.
gfl_air:
  enabled: false
  # Barr Engineering ArcGIS Enterprise FeatureServer (public, GET-only). The
  # readings live in the "Monitoring Data" table (layer 4). Verified 2026-07-14.
  service_url: "https://enterprisegis.barr.com/server/rest/services/GFL/GFL_Arbor_Hills_Public_Web_Data/FeatureServer"
  readings_layer: 4
  dashboard_url: "https://barrgisonline.maps.arcgis.com/apps/dashboards/ac08a03f8018403ba6ae1c2243c00e99"
  station_prefix: "MS-"             # perimeter gas stations; excludes the stale "10-Meter MET Tower" row
  max_record_count: 2000            # page size for the incremental OBJECTID query (service cap is 10000)
  # Which readings land in the shared Measurements tab. The feed is hourly (~288
  # rows/day at 'all'), so the default 'digest' keeps every exceedance + a per-
  # station daily peak (~12/day) — the source feed stays the system of record for
  # full hourly history. Set 'all' for full fidelity in the Sheet. See ADR 014.
  measurements_mode: digest
  # Exceedance ACTION LEVELS — CONSERVATIVE defaults, CONFIRM before enabling.
  #   h2s_ppb 72: Michigan EGLE has no ambient H2S standard; its Initial Threshold
  #     Screening Level (ITSL) is 100 µg/m³ (24-hr avg) ≈ 72 ppb (health screening).
  #     A LOWER odor-nuisance level is ~5-8 ppb — far more sensitive (H2S>=5 ppb
  #     occurred ~2874× in 4 yrs); using it as an URGENT trigger would flood, so it
  #     is a 'watch' reference, not the default alert. Trisha's call.
  #   ch4_ppm 12500: 25% of the methane LEL (LEL = 5% vol = 50,000 ppm); 40 CFR
  #     258.23 requires methane below the LEL at the facility boundary. Perimeter
  #     readings run ~4-27 ppm, so this fires only on a genuine gas-migration event;
  #     a lower 'elevated landfill gas' watch level (~100 ppm) is available. Trisha's call.
  thresholds:
    h2s_ppb: 72
    ch4_ppm: 12500
  # Sentinel / no-data values in the feed (ambiguous no-data vs off-scale-high).
  # Excluded from the measured series; surfaced as anomalies. ADR 014 RECOMMENDS
  # treating them as alert-worthy (fail-safe — don't infer 'benign' when the
  # semantics are unknowable); flip alert_on_sentinel to false to silence them.
  sentinels:
    h2s_ppb: 999
    ch4_ppm: 99999
  alert_on_sentinel: true
  # Anti-stampede: if one poll yields more new readings than this (e.g. the source
  # reinserts the whole table, bumping every OBJECTID), re-baseline instead of
  # blasting the case file (mirrors wds.max_new_wds_alerts_per_run /
  # watcher.max_new_docs_per_run). Normal daily volume is ~144 (6 stations × hourly).
  max_new_readings_per_run: 1000

# --- Alerts ---
# Add/remove addresses by editing this list — no code change needed.
alert_recipients:
  - arbor-hills@trishakunst.com          # alerts go to Trisha (Cloudflare catch-all → Gmail)
  - info@theconservancyinitiative.org    # The Conservancy Initiative (general)
  - ddrinan@theconservancyinitiative.org # David Drinan — Conservancy VP; MMPC opposition seat
  - leslievans@comcast.net               # Leslie Evans — Conservancy board member; downwind resident
  - hwangr@umich.edu                     # Roland Hwang — voting MMPC member (adjacent-community seat), Northville

# Urgent triggers -> same-day email. Procedural items -> weekly digest as action
# items. Everything else -> weekly Sunday digest.
urgent:
  severity_is_urgent: true       # any doc the parser marks "urgent"
  # Urgency fires only on a MEASURED temperature at/above this (deg F). A
  # permitted ceiling / HOV-waiver limit at this value does NOT fire — that
  # conflation would discredit the artifact. See docs/decisions/004.
  measured_temp_urgent_f: 145    # MACT limit
  # Lower watch threshold: EPA gas-well operating limit. Tracked for trend
  # comparison and (future) a Watch tier; does not fire an urgent alert today.
  measured_temp_watch_f: 131

# Temperature reference thresholds (deg F), for downstream trend/tier logic.
temperature_thresholds:
  epa_gas_operating_f: 131       # EPA gas-well operating limit (watch)
  mact_f: 145                    # MACT limit (urgent)
