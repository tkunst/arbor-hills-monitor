# --- Ridge Wood Elementary H2S monthly reports (Stream G, ADR 016, added 2026-07-14) ---
# OFF BY DEFAULT. Barr Engineering (the same consultant behind Stream E) runs an H2S
# air monitor at Ridge Wood Elementary School under a U.S. EPA agreement and posts a
# monthly, QA'd, born-digital 24-hour-average PDF report to a public page. This is a
# DOCUMENT-archive source (the "new PDF appears -> mirror + extract" shape of Mirror
# D / mmpc_archiver), NOT a live numeric feed like Stream E. When enabled,
# ridgewood_archiver.py scrapes the report list off the page (never constructs a URL —
# the filename carries an unpredictable cache-buster), diffs by YYYY-MM against the
# "Ridge Wood Reports" tab, mirrors each new PDF to Drive, extracts the month's max
# 24-hr average into the shared Measurements tab (basis=measured, attributed to the
# Barr/EPA monitor), and emails a same-day alert on a stated 24-hr exceedance of 72 ppb
# or 15-min exceedance of 750 ppb. The 72 ppb level is the SAME one Stream E ships
# (cross-confirmed across both air monitors, ADR 014); 750 ppb is a new acute level.
#
# ACTIVATION — same pattern as Stream C / Mirror D / PFAS / GFL air. All Trisha's:
#   1. review + merge,
#   2. provision the Drive folder secret GOAUTH_RIDGEWOOD_FOLDER_ID (a NEW folder for
#      the Ridge Wood PDFs — see scripts/setup notes + ADR 016). The three shared
#      GOAUTH_CLIENT_ID/_SECRET/_REFRESH_TOKEN secrets are already live. This secret
#      is OPTIONAL: without it the stream still extracts + alerts, it just doesn't
#      mirror to Drive (the exceedance alert never depends on the mirror).
#   3. set enabled: true here and commit. The first enabled run backfills ~66
#      historical months (alerts SUPPRESSED during the backfill — those are years-old
#      all-clear reports; their data is still recorded), then steady-state ~1/month.
# Until enabled: true is on main, ridgewood.yml runs on schedule but
# ridgewood_archiver._should_run() makes every run a quiet no-op.
ridgewood:
  enabled: true                     # activated 2026-07-15 (Trisha) — see ADR 016. GOAUTH_RIDGEWOOD_FOLDER_ID provisioned + full 66-month backfill mirrored 2026-07-15.
  page_url: "https://arborhillsmonitoring.com/Home/Ridgewood"
  # Relative /Files/... report links on the page are absolutized against this host.
  base_url: "https://www.arborhillsmonitoring.com"
  # Published action levels (the monitor's own; ADR 016). h2s_24h_ppb is checked
  # against the report's numeric daily 24-hr averages; h2s_15min_ppb is the acute
  # level cited in the alert text (a 15-min exceedance only ever appears in prose, so
  # the classifier catches it via the ABSENCE of the report's all-clear statement —
  # see ridgewood_client.classify_report, which is fail-safe + footnote-safe).
  thresholds:
    h2s_24h_ppb: 72
    h2s_15min_ppb: 750
  # Anti-stampede / timeout guard: process at most this many new months per run
  # (newest first, resumable via the dedup tab). A run draining more than this is a
  # historical backfill -> alerts suppressed for it. Normal monthly volume is 1.
  max_new_reports_per_run: 12
  # Two-tier alert routing. A real 24-hr EXCEEDANCE (a numeric daily value >=
  # h2s_24h_ppb) is a public-health signal and goes to the full alert_recipients
  # list below. The lower-severity REVIEW-tier alerts (missing all-clear phrase /
  # no text layer / parse anomaly — "someone should check this report") are
  # operational and go to review_recipients VERBATIM (Trisha only), the same
  # per-watch override the meeting-watch uses, so the external advocacy list isn't
  # emailed about a format hiccup. Leave review_recipients empty/unset to send
  # review-tier alerts to the full list too.
  review_recipients:
    - arbor-hills@trishakunst.com          # Trisha only (not the advocacy list)

# --- ROP (air Title V permit) watch (ADR 017, added 2026-07-15) ---
# OFF BY DEFAULT. All three Arbor Hills air facilities have a ROP renewal IN
# PROCESS: N2688 (landfill, ROP0000224 v3), N1504 (Energy, ROP0000656 v3), P1488
# (Emerald RNG, ROP0000236 v3). A renewal reaching its 30-day PUBLIC COMMENT
# window is a second advocacy venue (air-permit conditions) — easy to miss amid
# a ~1,800-row statewide CSV. When enabled, rop_watcher.py watches THREE public
# EGLE sources and alerts on any change:
#   1. the EPA ROP Monthly Report CSV (facility-level workflow tasks) for the
#      three target SRNs below — task-status / permit-status / dates advancing,
#      or a new task/version row appearing (e.g. N2688's renewal sub-task "Send
#      working draft conditions to applicant" going Unstarted -> started);
#   2. the N2688 renewal folder's file list — a new file (a draft renewal ROP /
#      staff report);
#   3. the statewide ROP_Public_Notice.pdf — whether N2688 appears (the 30-day-
#      comment-window trip-wire).
# The FIRST sighting of each of the five derived items baselines silently, same
# as pfas_watcher/civicclerk_watcher. See rop_client.py / rop_watcher.py.
#
# ⚠️ M3333 ("Conway Products Corporation d/b/a Emerald Spa Corp") is an
# unrelated facility that also contains "Emerald" in its name (P1488 is
# "Emerald RNG LLC") — rop_client filters by exact SRN, never by name, so
# M3333 can never be pulled in by construction.
#
# ACTIVATION — same three-step pattern as Stream C / Mirror D / PFAS / GFL air /
# Ridge Wood. All Trisha's:
#   1. review + merge,
#   2. the first enabled run just baselines all five items (records a snapshot,
#      alerts on NONE) — no seed script needed,
#   3. set enabled: true here and commit.
# Until enabled: true is on main, rop-watch.yml runs on schedule but
# rop_watcher._should_run() makes every run a quiet no-op.
rop:
  enabled: true                      # activated 2026-07-16 (Trisha) — see ADR 017
  srns:
    - "N2688"    # Arbor Hills Landfill — the primary advocacy concern
    - "N1504"    # Arbor Hills Energy
    - "P1488"    # Emerald RNG
  # Optional per-watch recipient override (Trisha only, like Meeting Watch /
  # Ridge Wood's review_recipients). Leave unset to send to the full
  # alert_recipients list below — the default, since a ROP renewal advancing
  # (especially reaching public comment) is a substantive advocacy signal for
  # the whole Conservancy, not an operational/format concern.
  # recipients:
  #   - arbor-hills@trishakunst.com

# --- EGLE MMD Open Data watch (Stream I, ADR 018) ---
# Daily snapshot-diff on EGLE Materials Management Division's KEYLESS ArcGIS
# registry (gisagoegle.state.mi.us .../EGLE/MmdOpenData/MapServer, layer 0 —
# the master (facility, module) table). This is the STATE'S OWN registry view
# of the facility: one watched item per wdsid below, alerting on any change to
# its record set — a disposal-area/Part 115 status flip, the map-hidden
# (show=0) compost registration changing or surfacing, or a watched wdsid
# APPEARING in the service at all (465941 is absent today; its first record
# showing up means the state has started tracking the compost/expansion
# parcel). Statuses change rarely — near-silent in steady state. The FIRST
# sighting of each wdsid baselines silently (an EMPTY record set is a valid
# baseline). See mmd_client.py / mmd_watcher.py.
#
# ACTIVATION — same pattern as Stream C / Mirror D / PFAS / GFL air / Ridge
# Wood / ROP: review + merge; the first enabled run just baselines; flip
# enabled here to pause/resume without losing state (the MMD Watch tab).
mmd:
  enabled: true                      # activated at build (Trisha's 2026-07-21 "automate for monitor to use it") — see ADR 018
  wdsids:
    - 475946   # Arbor Hills Landfill, Inc — landfill + (map-hidden) compost registration records
    - 465941   # Arbor Hills Compost Area — ABSENT from the service today; appearing = trip-wire
  # Recipient override: Trisha only to start (Meeting Watch precedent for a
  # brand-new stream). Delete/comment this block to send to the full
  # alert_recipients list once the alert copy has been seen in the wild.
  recipients:
    - arbor-hills@trishakunst.com

# --- Alerts ---
# Add/remove addresses by editing this list — no code change needed.
alert_recipients:
  - arbor-hills@trishakunst.com          # alerts go to Trisha (Cloudflare catch-all → Gmail)
  - info@theconservancyinitiative.org    # The Conservancy Initiative (general)
  - ddrinan@theconservancyinitiative.org # David Drinan — Conservancy VP; MMPC opposition seat
  - leslievans@comcast.net               # Leslie Evans — Conservancy board member; downwind resident
  - hwangr@umich.edu                     # Roland Hwang — voting MMPC member (adjacent-community seat), Northville

# Urgent triggers -> same-day email. Procedural items -> weekly digest as action
# items. Everything else -> weekly Sunday digest.
urgent:
  severity_is_urgent: true       # any doc the parser marks "urgent"
  # Urgency fires only on a MEASURED temperature at/above this (deg F). A
  # permitted ceiling / HOV-waiver limit at this value does NOT fire — that
  # conflation would discredit the artifact. See docs/decisions/004.
  measured_temp_urgent_f: 145    # MACT limit
  # Lower watch threshold: EPA gas-well operating limit. Tracked for trend
  # comparison and (future) a Watch tier; does not fire an urgent alert today.
  measured_temp_watch_f: 131

# Temperature reference thresholds (deg F), for downstream trend/tier logic.
temperature_thresholds:
  epa_gas_operating_f: 131       # EPA gas-well operating limit (watch)
  mact_f: 145                    # MACT limit (urgent)
